<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__container">

    <!-- Logo -->
    <a routerLink="/" class="navbar__logo" (click)="closeMenu()">
      <div class="logo-icon">
        <span class="logo-arabic">الغنجة</span>
      </div>
      <div class="logo-text">
        <span class="logo-name">El-Ghanja</span>
        <span class="logo-tagline">Bride & Spa</span>
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="navbar__nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">
        <i class="pi pi-home"></i> Accueil
      </a>
      <a routerLink="/about" routerLinkActive="active" class="nav-link">
        <i class="pi pi-info-circle"></i> À Propos
      </a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-link">
        <i class="pi pi-envelope"></i> Contact
      </a>
    </nav>

    <!-- CTA Buttons -->
    @if (!authService.isAuthenticated()) {
      <div class="navbar__actions">
        <a routerLink="/login" class="btn-nav-outline">
          <i class="pi pi-sign-in"></i>
          Connexion
        </a>
      </div>
    }

    <!-- Hamburger -->
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen()">
    <nav class="mobile-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="mobile-nav-link" (click)="closeMenu()">
        <i class="pi pi-home"></i> Accueil
      </a>
      <a routerLink="/about" routerLinkActive="active" class="mobile-nav-link" (click)="closeMenu()">
        <i class="pi pi-info-circle"></i> À Propos
      </a>
      <a routerLink="/contact" routerLinkActive="active" class="mobile-nav-link" (click)="closeMenu()">
        <i class="pi pi-envelope"></i> Contact
      </a>
      @if (!authService.isAuthenticated()) {
        <div class="mobile-actions">
          <a routerLink="/login" class="btn-nav-outline full-width" (click)="closeMenu()">
            <i class="pi pi-sign-in"></i> Connexion
          </a>
        </div>
      }
    </nav>
  </div>
</header>
